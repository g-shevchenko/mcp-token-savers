name: Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

# Opt JavaScript-based actions into Node 24 runtime ahead of the 2026-06-02
# forced switch. All actions used here are Node-24-compatible.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-artifacts:
    name: Build verifiable release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
      - name: Run release audit
        run: bash scripts/public-release-audit.sh
      - name: Generate SBOM
        run: node scripts/generate-sbom.mjs sbom.cdx.json
      - name: Build source archive and proof
        run: |
          set -euo pipefail
          release="${GITHUB_REF_NAME}"
          archive="hwai-mcp-stack-${release}.tar.gz"
          git archive --format=tar.gz --prefix="hwai-mcp-stack-${release}/" "$GITHUB_SHA" > "$archive"
          {
            echo "# Release Proof"
            echo
            echo "- repository: ${GITHUB_REPOSITORY}"
            echo "- ref: ${GITHUB_REF_NAME}"
            echo "- commit: ${GITHUB_SHA}"
            echo "- workflow: ${GITHUB_WORKFLOW}"
            echo
            echo "Generated by GitHub Actions after public release audit passed."
          } > RELEASE_PROOF.md
          sha256sum "$archive" sbom.cdx.json RELEASE_PROOF.md > SHA256SUMS
      - name: Attest archive
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: |
            hwai-mcp-stack-${{ github.ref_name }}.tar.gz
            sbom.cdx.json
            SHA256SUMS
            RELEASE_PROOF.md
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "hwai-mcp-stack-${GITHUB_REF_NAME}.tar.gz" \
            sbom.cdx.json \
            SHA256SUMS \
            RELEASE_PROOF.md \
            --clobber

