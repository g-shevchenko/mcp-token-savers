name: Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release-artifacts:
    name: Build verifiable release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
      - name: Run release audit
        run: bash scripts/public-release-audit.sh
      - name: Generate SBOM
        run: node scripts/generate-sbom.mjs sbom.cdx.json
      - name: Build source archive and proof
        run: |
          set -euo pipefail
          release="${GITHUB_REF_NAME}"
          archive="hwai-mcp-stack-${release}.tar.gz"
          git archive --format=tar.gz --prefix="hwai-mcp-stack-${release}/" "$GITHUB_SHA" > "$archive"
          {
            echo "# Release Proof"
            echo
            echo "- repository: ${GITHUB_REPOSITORY}"
            echo "- ref: ${GITHUB_REF_NAME}"
            echo "- commit: ${GITHUB_SHA}"
            echo "- workflow: ${GITHUB_WORKFLOW}"
            echo
            echo "Generated by GitHub Actions after public release audit passed."
          } > RELEASE_PROOF.md
          sha256sum "$archive" sbom.cdx.json RELEASE_PROOF.md > SHA256SUMS
      - name: Attest archive
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            hwai-mcp-stack-${{ github.ref_name }}.tar.gz
            sbom.cdx.json
            SHA256SUMS
            RELEASE_PROOF.md
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "hwai-mcp-stack-${GITHUB_REF_NAME}.tar.gz" \
            sbom.cdx.json \
            SHA256SUMS \
            RELEASE_PROOF.md \
            --clobber

