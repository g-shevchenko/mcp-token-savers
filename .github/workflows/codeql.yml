name: CodeQL

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "24 3 * * 2"

permissions:
  contents: read
  security-events: write

# Opt JavaScript-based actions into Node 24 runtime ahead of the 2026-06-02
# forced switch. All actions used here are Node-24-compatible.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: CodeQL JavaScript/TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          languages: javascript-typescript
      - name: Autobuild
        uses: github/codeql-action/autobuild@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
      - name: Analyze
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa

