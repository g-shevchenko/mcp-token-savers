name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "37 4 * * 3"
  push:
    branches: ["main"]

# Scorecard publisher workflow restrictions:
#   - Top-level permissions must be read-only.
#   - No env vars / defaults at workflow level OR job level on the
#     scorecard job (any env triggers "scorecard job contains env vars").
# Therefore this workflow cannot opt into FORCE_JAVASCRIPT_ACTIONS_TO_NODE24.
# All JS actions here are already on Node-24-compatible majors
# (actions/checkout@v6); ossf/scorecard-action is a Docker image so the
# Node deprecation does not apply to it. github/codeql-action/upload-sarif
# may still surface a Node 20 cosmetic annotation until its v3 release with
# Node 24 lands (Dependabot will sweep it up).
# https://github.com/ossf/scorecard-action#workflow-restrictions
permissions: read-all

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba
        with:
          sarif_file: scorecard.sarif
