name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "37 4 * * 3"
  push:
    branches: ["main"]

# Top-level perms must be read-only. Scorecard publisher rejects global
# write perms (https://github.com/ossf/scorecard-action#workflow-restrictions).
permissions: read-all

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          sarif_file: scorecard.sarif
